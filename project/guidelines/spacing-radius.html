<!-- @dsCard group="Spacing" viewport="700x180" subtitle="Radius 8/12/20/28/pill · 1px borders at 10% mist" name="Radius & borders" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-page); padding: 22px 24px; display: flex; gap: 12px; align-items: flex-end; font-family: var(--font-sans); }
  .r { background: var(--surface-card); border: 1px solid var(--border-subtle); display: flex; align-items: flex-end; padding: 10px; }
  .m { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); }
  .col { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .pill { border-radius: 999px; padding: 8px 18px; border: 1px solid var(--border-strong); color: var(--text-primary); font-size: 12px; }
  .rules { margin-left: auto; font-family: var(--font-mono); font-size: 10px; line-height: 1.9; color: var(--text-secondary); align-self: center; }
</style>
</head>
<body>
  <div class="col"><div class="r" style="width:64px;height:64px;border-radius:8px"></div><div class="m">sm 8 · chips</div></div>
  <div class="col"><div class="r" style="width:72px;height:72px;border-radius:12px"></div><div class="m">md 12 · buttons</div></div>
  <div class="col"><div class="r" style="width:88px;height:88px;border-radius:20px"></div><div class="m">lg 20 · cards</div></div>
  <div class="col"><div class="r" style="width:100px;height:100px;border-radius:28px"></div><div class="m">xl 28 · feature</div></div>
  <div class="col"><div class="pill">Tag</div><div class="m">pill · tags</div></div>
  <div class="rules">border: 1px mist @ 10%<br>hover: mist @ 22%<br>active: lime @ 45%</div>
</body>
</html>
