<!-- @dsCard group="Spacing" viewport="700x190" subtitle="12-col / 1280px max · 24px gutters · controlled width" name="Grid & layout" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-page); padding: 20px 24px; font-family: var(--font-sans); }
  .frame { border: 1px solid var(--border-subtle); border-radius: 10px; padding: 10px 28px; }
  .cols { display: grid; grid-template-columns: repeat(12, 1fr); gap: 8px; height: 64px; }
  .cols div { background: var(--accent-dim); border-radius: 4px; }
  .span8 { grid-column: span 8; background: rgba(143,183,194,0.18) !important; display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 0.1em; color: var(--text-secondary); text-transform: uppercase; }
  .span4 { grid-column: span 4; background: rgba(143,183,194,0.18) !important; display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 0.1em; color: var(--text-secondary); text-transform: uppercase; }
  .note { margin-top: 12px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; color: var(--text-muted); line-height: 1.8; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="frame">
    <div class="cols">
      <div></div><div></div><div></div><div></div><div></div><div></div>
      <div></div><div></div><div></div><div></div><div></div><div></div>
    </div>
    <div class="cols" style="height: 36px; margin-top: 8px">
      <div class="span8">content · span 8</div>
      <div class="span4">visual · span 4</div>
    </div>
  </div>
  <div class="note">Desktop 12 col / 64–96px margin · Tablet 8 col / 32–48px · Mobile 4 col / 20–24px. Max width: 1280 default · 1440 immersive hero · 960 text-heavy.</div>
</body>
</html>
