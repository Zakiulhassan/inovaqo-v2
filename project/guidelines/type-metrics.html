<!-- @dsCard group="Type" viewport="700x170" subtitle="Metrics — confident numbers, mono labels, lime as small signal" name="Numbers & metrics" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-page); padding: 24px; display: flex; gap: 12px; }
  .metric { flex: 1; background: var(--surface-card); border: 1px solid var(--border-subtle); border-radius: 14px; padding: 18px; }
  .n { font-family: var(--font-sans); font-size: 40px; font-weight: 500; letter-spacing: -0.03em; color: var(--text-primary); line-height: 1; }
  .n em { font-style: normal; color: var(--accent); }
  .l { font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin-top: 10px; }
</style>
</head>
<body>
  <div class="metric"><div class="n">75<em>+</em></div><div class="l">Products shipped</div></div>
  <div class="metric"><div class="n">98<em>%</em></div><div class="l">Client satisfaction</div></div>
  <div class="metric"><div class="n">2<em>wk</em></div><div class="l">Product clarity sprint</div></div>
</body>
</html>
