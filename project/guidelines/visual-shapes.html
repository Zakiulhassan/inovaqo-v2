<!-- @dsCard group="Visual Language" viewport="700x250" subtitle="Abstract shapes with psychological meanings — original INOVAQO geometry" name="Shape language" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-page); padding: 20px 24px; font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  .tile { border: 1px solid var(--border-subtle); border-radius: 12px; padding: 16px 10px 12px; display: flex; flex-direction: column; align-items: center; gap: 12px; color: var(--color-mist-white); }
  .tile svg { width: 52px; height: 52px; display: block; }
  .m { font-family: var(--font-mono); font-size: 8px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); text-align: center; line-height: 1.6; }
  .m b { display: block; color: var(--text-secondary); font-weight: 500; }
  .note { margin-top: 12px; font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="grid">
    <div class="tile">
      <svg viewBox="0 0 64 64" fill="none"><path d="M 54.6 41.4 A 24 24 0 1 1 54.6 22.6" stroke="currentColor" stroke-width="8" stroke-linecap="round"></path></svg>
      <div class="m"><b>Openness</b>no black boxes</div>
    </div>
    <div class="tile">
      <svg viewBox="0 0 64 64" fill="none"><line x1="12" y1="52" x2="46" y2="18" stroke="currentColor" stroke-width="8" stroke-linecap="round"></line><circle cx="52" cy="12" r="7" fill="#C9E835"></circle></svg>
      <div class="m"><b>Velocity</b>speed with direction</div>
    </div>
    <div class="tile">
      <svg viewBox="0 0 64 64" fill="none"><rect x="6" y="6" width="24" height="24" rx="7" fill="currentColor"></rect><rect x="34" y="6" width="24" height="24" rx="7" fill="currentColor"></rect><rect x="6" y="34" width="24" height="24" rx="7" fill="currentColor"></rect><rect x="34" y="34" width="24" height="24" rx="7" fill="#C9E835"></rect></svg>
      <div class="m"><b>One team</b>modular systems</div>
    </div>
    <div class="tile">
      <svg viewBox="0 0 64 64" fill="none"><circle cx="32" cy="32" r="7" fill="currentColor"></circle><circle cx="32" cy="32" r="17" stroke="currentColor" stroke-width="5"></circle><circle cx="32" cy="32" r="28" stroke="currentColor" stroke-width="3" opacity="0.55"></circle></svg>
      <div class="m"><b>Scale</b>growth ripple</div>
    </div>
    <div class="tile">
      <svg viewBox="0 0 64 64" fill="none"><circle cx="32" cy="32" r="23" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-dasharray="0.5 13"></circle></svg>
      <div class="m"><b>Continuity</b>creative momentum</div>
    </div>
    <div class="tile">
      <svg viewBox="0 0 64 64" fill="none"><rect x="6" y="6" width="52" height="52" rx="10" stroke="currentColor" stroke-width="5"></rect><circle cx="32" cy="32" r="14" fill="#C9E835"></circle></svg>
      <div class="m"><b>Control</b>controlled velocity</div>
    </div>
  </div>
  <div class="note">Use 1–2 per composition, large and confident · one lime element max per shape · pair with a mono meaning label · never scatter as decoration</div>
</body>
</html>
