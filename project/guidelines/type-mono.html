<!-- @dsCard group="Type" viewport="700x200" subtitle="Geist Mono — labels, metadata, process steps. Never paragraphs." name="Mono labels" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-page); padding: 22px 24px; font-family: var(--font-sans); }
  .stack { display: flex; flex-direction: column; gap: 12px; }
  .demo { display: flex; align-items: center; gap: 14px; }
  .use { font-size: 11.5px; color: var(--text-secondary); }
  .tag { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-secondary); border: 1px solid var(--border-subtle); border-radius: 999px; padding: 4px 10px; }
  .steps { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-secondary); }
  .steps em { font-style: normal; color: var(--accent); }
</style>
</head>
<body>
  <div class="stack">
    <div class="demo"><span class="inq-label inq-label--accent">AI Product Engineering / 01</span><span class="use">— section + slide labels</span></div>
    <div class="demo"><span class="inq-label">Case Study / LegalTech</span><span class="use">— case study metadata</span></div>
    <div class="demo"><span class="steps">Diagnose / Architect / <em>Build</em> / Launch / Scale</span><span class="use">— process steps</span></div>
    <div class="demo"><span class="tag">LLM</span><span class="tag">RAG</span><span class="tag">Agents</span><span class="tag">Automation</span><span class="use">— capability tags</span></div>
  </div>
</body>
</html>
