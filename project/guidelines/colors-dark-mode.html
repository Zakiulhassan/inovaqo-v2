<!-- @dsCard group="Colors" viewport="700x190" subtitle="Dark mode surface stack — the primary brand expression" name="Dark mode surfaces" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-page); padding: 20px; font-family: var(--font-sans); }
  .stack { background: var(--surface-page); border: 1px solid var(--border-subtle); border-radius: 14px; padding: 18px; display: flex; gap: 14px; }
  .panel { background: var(--surface-panel); border-radius: 12px; padding: 14px; flex: 1; }
  .card { background: var(--surface-card); border: 1px solid var(--border-subtle); border-radius: 10px; padding: 12px; margin-top: 10px; }
  .t { color: var(--text-primary); font-size: 14px; font-weight: 500; }
  .s { color: var(--text-secondary); font-size: 12px; line-height: 1.5; margin-top: 2px; }
  .m { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); }
  .legend { width: 220px; display: flex; flex-direction: column; gap: 7px; justify-content: center; }
  .legend div { display: flex; align-items: center; gap: 8px; font-family: var(--font-mono); font-size: 10px; color: var(--text-secondary); }
  .chip { width: 14px; height: 14px; border-radius: 4px; border: 1px solid var(--border-subtle); flex: none; }
</style>
</head>
<body>
  <div class="stack">
    <div style="flex:1.4">
      <div class="m">surface-page · #061113</div>
      <div class="panel">
        <div class="m" style="color: rgba(234,242,239,0.6)">surface-panel · #0A3C40</div>
        <div class="card">
          <div class="m">surface-card · #1B2528</div>
          <div class="t">Primary text — Mist White</div>
          <div class="s">Secondary text at 72% mist. Muted metadata uses Cloud Gray at 76%.</div>
        </div>
      </div>
    </div>
    <div class="legend">
      <div><span class="chip" style="background:#061113"></span> page — #061113</div>
      <div><span class="chip" style="background:#0A3C40"></span> panel — #0A3C40</div>
      <div><span class="chip" style="background:#1B2528"></span> card — #1B2528</div>
      <div><span class="chip" style="background:#233034"></span> raised — #233034</div>
      <div><span class="chip" style="background:#C9E835"></span> CTA — lime, dark text</div>
      <div><span class="chip" style="background:rgba(234,242,239,0.1)"></span> border — mist @ 10%</div>
    </div>
  </div>
</body>
</html>
