<!-- @dsCard group="Visual Language" viewport="700x270" subtitle="The lime dashed path — continuity, movement, creativity (from the concept .fig)" name="Dashed continuity line" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-page); padding: 20px 24px; font-family: var(--font-sans); }
  .hero { background: var(--gradient-depth); border: 1px solid var(--border-subtle); border-radius: 14px; height: 130px; position: relative; overflow: hidden; }
  .hero .ph { position: absolute; left: 18px; bottom: 14px; font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); }
  .loop { position: absolute; right: 4%; top: 8%; width: 62%; height: 84%; object-fit: contain; }
  .row { display: flex; gap: 14px; margin-top: 12px; align-items: center; }
  .wavebox { flex: 1.4; }
  .wave { height: 44px; width: 100%; object-fit: contain; display: block; }
  .rules { flex: 1; font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 0.05em; text-transform: uppercase; color: var(--text-muted); line-height: 1.9; }
  .rules em { font-style: normal; color: var(--accent); }
  .m { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-top: 6px; }
</style>
</head>
<body>
  <div class="hero">
    <img class="loop" src="../assets/motifs/dash-loop.svg" alt="">
    <div class="ph">imagery / section — the path travels over it</div>
  </div>
  <div class="row">
    <div class="wavebox">
      <img class="wave" src="../assets/motifs/dash-wave.svg" alt="">
      <div class="m">assets/motifs/dash-wave.svg · original Figma vector</div>
    </div>
    <div class="rules">
      round dashes · always <em>lime</em><br>
      one per composition<br>
      it <em>leads the eye</em> somewhere —<br>
      continuity · movement · creativity
    </div>
  </div>
</body>
</html>
