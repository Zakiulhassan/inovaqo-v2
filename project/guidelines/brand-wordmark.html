<!-- @dsCard group="Brand" viewport="700x190" subtitle="Styled-type rendition — custom Q-Core as the signature letter" name="Wordmark" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--surface-page); padding: 28px 24px; display: flex; flex-direction: column; gap: 18px; align-items: center; justify-content: center; }
  .wm { display: inline-flex; align-items: center; font-family: var(--font-sans); font-weight: 600; font-size: 52px; letter-spacing: 0.02em; color: var(--text-primary); line-height: 1; }
  .wm img { height: 0.92em; width: 0.92em; margin: 0 0.01em; transform: translateY(0.115em); }
  .row { display: flex; gap: 28px; align-items: center; }
  .wm.small { font-size: 22px; }
  .light { background: var(--color-mist-white); border-radius: 12px; padding: 12px 20px; color: var(--color-core-dark); }
  .m { font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="wm">INOVA<img src="../assets/logo/qcore-lime.svg" alt="Q">O</div>
  <div class="row">
    <div class="wm small">INOVA<img src="../assets/logo/qcore-mist.svg" alt="Q">O</div>
    <div class="wm small light">INOVA<img src="../assets/logo/qcore-dark.svg" alt="Q">O</div>
    <div class="m">One-color first · uppercase Geist 600 · Q is the recognition device</div>
  </div>
</body>
</html>
