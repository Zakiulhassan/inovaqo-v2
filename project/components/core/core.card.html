<!-- @dsCard group="Components" viewport="700x260" subtitle="Button, Badge, Tag, MonoLabel" name="Core" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>body { margin: 0; background: var(--surface-page); padding: 22px 24px; }</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const findNS = () => { for (const k of Object.getOwnPropertyNames(window)) { try { const v = window[k]; if (v && typeof v === "object" && v.Button && v.QCore) return v; } catch (e) {} } return null; };
const row = { display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap", marginBottom: 18 };
function Demo({ NS }) {
  const { Button, Badge, Tag, MonoLabel } = NS;
  return (
    <div>
      <div style={row}>
        <Button variant="primary" arrow>Book a Discovery Call</Button>
        <Button variant="secondary">See What We've Built</Button>
        <Button variant="ghost">Learn more</Button>
        <Button variant="primary" disabled>Disabled</Button>
        <Button variant="primary" size="sm">Small</Button>
      </div>
      <div style={row}>
        <Badge tone="signal" dot>Live</Badge>
        <Badge tone="neutral">AI Product</Badge>
        <Badge tone="info" dot>In review</Badge>
        <Badge tone="alert" dot>Action needed</Badge>
      </div>
      <div style={row}>
        <Tag>LLM</Tag><Tag>RAG</Tag><Tag>Agents</Tag><Tag>Cloud</Tag><Tag>ETL</Tag>
      </div>
      <div style={{ display: "flex", gap: 28 }}>
        <MonoLabel accent index="01">AI Product Engineering</MonoLabel>
        <MonoLabel>Case Study / LegalTech</MonoLabel>
      </div>
    </div>
  );
}
function Pending() { return <div style={{ color: "var(--text-muted)", fontFamily: "var(--font-mono)", fontSize: 12, letterSpacing: "0.05em", lineHeight: 1.7 }}>Component bundle not yet compiled — set the project File type to "Design System" in the Share menu, then reload.</div>; }
const root = ReactDOM.createRoot(document.getElementById("root"));
let tries = 0;
(function boot() {
  const NS = findNS();
  if (NS) { root.render(<Demo NS={NS} />); return; }
  root.render(<Pending />);
  if (++tries < 12) setTimeout(boot, 500);
})();
</script>
</body>
</html>
