<!-- @dsCard group="Components" viewport="700x360" subtitle="StatusBadge, DataTable, Tabs, EmptyState" name="Product UI" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>body { margin: 0; background: var(--surface-page); padding: 22px 24px; }</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const findNS = () => { for (const k of Object.getOwnPropertyNames(window)) { try { const v = window[k]; if (v && typeof v === "object" && v.Button && v.QCore) return v; } catch (e) {} } return null; };
function Demo({ NS }) {
  const { StatusBadge, DataTable, Tabs, EmptyState, Button } = NS;
  const [tab, setTab] = React.useState("Pipelines");
  return (
    <div>
      <Tabs items={["Overview", "Pipelines", "Agents", "Settings"]} active={tab} onChange={setTab} />
      <div style={{ display: "grid", gridTemplateColumns: "1.4fr 1fr", gap: 16, marginTop: 18 }}>
        <DataTable
          columns={["Pipeline", "Status", "Last run"]}
          rows={[
            ["Ingest / CRM sync", <StatusBadge status="active">Running</StatusBadge>, "2m ago"],
            ["Embeddings refresh", <StatusBadge status="neutral">Queued</StatusBadge>, "1h ago"],
            ["Eval suite / nightly", <StatusBadge status="warning">Degraded</StatusBadge>, "6h ago"],
          ]}
        />
        <EmptyState title="No agents yet" action={<Button size="sm">New agent</Button>}>
          Connect a workflow to deploy your first AI agent.
        </EmptyState>
      </div>
    </div>
  );
}
function Pending() { return <div style={{ color: "var(--text-muted)", fontFamily: "var(--font-mono)", fontSize: 12, letterSpacing: "0.05em", lineHeight: 1.7 }}>Component bundle not yet compiled — set the project File type to "Design System" in the Share menu, then reload.</div>; }
const root = ReactDOM.createRoot(document.getElementById("root"));
let tries = 0;
(function boot() {
  const NS = findNS();
  if (NS) { root.render(<Demo NS={NS} />); return; }
  root.render(<Pending />);
  if (++tries < 12) setTimeout(boot, 500);
})();
</script>
</body>
</html>
