<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>body { margin: 0; background: var(--surface-page); padding: 24px; }</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const findNS = () => { for (const k of Object.getOwnPropertyNames(window)) { try { const v = window[k]; if (v && typeof v === "object" && v.Button && v.QCore) return v; } catch (e) {} } return null; };
function Demo({ NS }) {
  const { QCore, Wordmark, SignalPath, DashedPath, ShapeGlyph } = NS;
  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", gap: 36 }}>
        <Wordmark size={34} />
        <Wordmark size={20} qColor="var(--text-primary)" />
        <div style={{ display: "flex", gap: 16, alignItems: "center" }}>
          <QCore size={40} />
          <QCore size={28} color="var(--color-mist-white)" />
          <QCore size={24} color="var(--color-cloud-gray)" />
        </div>
      </div>
      <div style={{ marginTop: 30 }}>
        <SignalPath height={20} />
      </div>
      <div style={{ marginTop: 8, fontFamily: "var(--font-mono)", fontSize: 10, letterSpacing: "0.08em", textTransform: "uppercase", color: "var(--text-muted)" }}>
        signal path — divider / loader / connector
      </div>
      <div style={{ display: "flex", gap: 22, alignItems: "center", marginTop: 22, color: "var(--color-mist-white)" }}>
        {ShapeGlyph ? ["openRing", "velocity", "modules", "scale", "continuity", "control"].map((k) => <ShapeGlyph key={k} kind={k} size={44} />) : null}
        {DashedPath ? <DashedPath preset="swoosh" style={{ flex: 1 }} /> : null}
      </div>
      <div style={{ marginTop: 8, fontFamily: "var(--font-mono)", fontSize: 10, letterSpacing: "0.08em", textTransform: "uppercase", color: "var(--text-muted)" }}>
        shape glossary + dashed continuity line (concept 2.0)
      </div>
    </div>
  );
}
function Pending() { return <div style={{ color: "var(--text-muted)", fontFamily: "var(--font-mono)", fontSize: 12, letterSpacing: "0.05em", lineHeight: 1.7 }}>Component bundle not yet compiled — set the project File type to "Design System" in the Share menu, then reload.</div>; }
const root = ReactDOM.createRoot(document.getElementById("root"));
let tries = 0;
(function boot() {
  const NS = findNS();
  if (NS) { root.render(<Demo NS={NS} />); return; }
  root.render(<Pending />);
  if (++tries < 12) setTimeout(boot, 500);
})();
</script>
</body>
</html>
