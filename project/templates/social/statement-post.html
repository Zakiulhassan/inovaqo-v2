<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; width: 1080px; height: 1080px; background: var(--gradient-atmosphere); color: var(--text-primary); font-family: var(--font-sans); position: relative; overflow: hidden; }
  .frame { position: absolute; inset: 0; padding: 96px; display: flex; flex-direction: column; }
  .label { font-family: var(--font-mono); font-size: 22px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--color-signal-lime); }
  h1 { font-size: 92px; font-weight: 500; letter-spacing: -0.035em; line-height: 1.02; margin: 48px 0 0; text-wrap: balance; }
  h1 .dim { color: var(--text-muted); }
  .sig { margin-top: 56px; width: 460px; }
  .sig svg { width: 100%; display: block; overflow: visible; }
  .foot { margin-top: auto; display: flex; align-items: center; }
  .wordmark { display: inline-flex; align-items: center; font-weight: 600; font-size: 34px; letter-spacing: 0.02em; }
  .wordmark img { height: 0.92em; margin: 0 1px; transform: translateY(0.115em); }
  .foot .tag { margin-left: auto; font-family: var(--font-mono); font-size: 18px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); }
  .qmark { position: absolute; right: -120px; bottom: -120px; width: 460px; height: 460px; opacity: 0.05; }
</style>
</head>
<body>
  <img class="qmark" src="../../assets/logo/qcore-mist.svg" alt="">
  <div class="frame">
    <div class="label">Controlled Velocity / 01</div>
    <h1>Moving fast is not the problem. <span class="dim">Moving unclear is.</span></h1>
    <div class="sig">
      <svg viewBox="0 0 600 60" fill="none"><path d="M4 44 C 150 10, 240 58, 360 34 S 560 14, 596 30" stroke="#C9E835" stroke-width="4" stroke-linecap="round" stroke-dasharray="1 18"></path></svg>
    </div>
    <div class="foot">
      <span class="wordmark">INOVA<img src="../../assets/logo/qcore-lime.svg" alt="Q">O</span>
      <span class="tag">Move fast. Build clear. Scale right.</span>
    </div>
  </div>
</body>
</html>
