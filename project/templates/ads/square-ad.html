<!-- @startingPoint section="Ads" subtitle="Square paid ad template" viewport="1080x1080" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; width: 1080px; height: 1080px; background: var(--gradient-atmosphere); color: var(--text-primary); font-family: var(--font-sans); position: relative; overflow: hidden; }
  .frame { position: absolute; inset: 0; padding: 96px; display: flex; flex-direction: column; }
  h1 { font-size: 88px; font-weight: 500; letter-spacing: -0.035em; line-height: 1.03; margin: 0; text-wrap: balance; }
  h1 .dim { color: var(--text-muted); }
  .sub { font-size: 32px; line-height: 1.5; color: var(--text-secondary); margin-top: 36px; max-width: 760px; }
  .cta { display: inline-flex; align-items: center; gap: 14px; background: var(--color-signal-lime); color: var(--color-core-dark); font-size: 30px; font-weight: 600; padding: 24px 44px; border-radius: 18px; margin-top: 56px; align-self: flex-start; }
  .flow { margin-top: auto; display: flex; align-items: center; gap: 0; }
  .n { background: var(--surface-card); border: 1px solid var(--border-subtle); border-radius: 14px; padding: 18px 28px; font-family: var(--font-mono); font-size: 17px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-secondary); }
  .n.hot { border-color: var(--border-accent); color: var(--color-signal-lime); }
  .l { width: 38px; height: 2px; background: var(--gradient-signal-fade); }
  .wordmark { position: absolute; right: 96px; bottom: 88px; display: inline-flex; align-items: center; font-weight: 600; font-size: 28px; letter-spacing: 0.02em; }
  .wordmark img { height: 0.92em; margin: 0 1px; transform: translateY(0.115em); }
</style>
</head>
<body>
  <div class="frame">
    <h1>Your AI idea is not the hard part. <span class="dim">Shipping it right is.</span></h1>
    <div class="sub">AI product engineering from concept to scale — strategy, AI, product, and cloud in one team.</div>
    <div class="cta">Book a Discovery Call →</div>
    <div class="flow">
      <div class="n">Idea</div><div class="l"></div>
      <div class="n hot">AI Layer</div><div class="l"></div>
      <div class="n">Product</div><div class="l"></div>
      <div class="n">Scale</div>
    </div>
    <span class="wordmark">INOVA<img src="../../assets/logo/qcore-lime.svg" alt="Q">O</span>
  </div>
</body>
</html>
