<!-- @dsCard group="Slides" viewport="1280x720" subtitle="Dark impact CTA close" name="Deck — CTA" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; width: 1280px; height: 720px; background: var(--gradient-atmosphere); color: var(--text-primary); font-family: var(--font-sans); position: relative; overflow: hidden; }
  .frame { position: absolute; inset: 0; padding: 80px 88px; display: flex; flex-direction: column; align-items: flex-start; }
  .label { font-family: var(--font-mono); font-size: 14px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--color-signal-lime); }
  h1 { font-size: 66px; font-weight: 500; letter-spacing: -0.035em; line-height: 1.03; margin: 26px 0 0; max-width: 900px; text-wrap: balance; }
  .sub { font-size: 20px; line-height: 1.55; color: var(--text-secondary); margin-top: 24px; max-width: 720px; }
  .cta { display: inline-flex; align-items: center; gap: 12px; background: var(--color-signal-lime); color: var(--color-core-dark); font-size: 21px; font-weight: 600; padding: 18px 34px; border-radius: 14px; margin-top: 44px; }
  .foot { margin-top: auto; display: flex; align-items: center; width: 100%; }
  .wordmark { display: inline-flex; align-items: center; font-weight: 600; font-size: 24px; letter-spacing: 0.02em; }
  .wordmark img { height: 0.92em; margin: 0 1px; transform: translateY(0.115em); }
  .foot .r { margin-left: auto; font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="frame" data-screen-label="Deck / CTA">
    <div class="label">Next Step / 12</div>
    <h1>Have an AI product idea that needs to become real?</h1>
    <div class="sub">Tell us what you're building. We'll help you understand the product path, technical risks, AI opportunities, and next steps.</div>
    <div class="cta">Book a Discovery Call →</div>
    <div class="foot">
      <span class="wordmark">INOVA<img src="../../assets/logo/qcore-lime.svg" alt="Q">O</span>
      <span class="r">inovaqo.com · hello@inovaqo.com</span>
    </div>
  </div>
</body>
</html>
