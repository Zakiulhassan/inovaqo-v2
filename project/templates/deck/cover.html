<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; width: 1280px; height: 720px; background: var(--gradient-atmosphere); color: var(--text-primary); font-family: var(--font-sans); position: relative; overflow: hidden; }
  .grid-bg { position: absolute; inset: 0; background-image: linear-gradient(rgba(234,242,239,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(234,242,239,0.03) 1px, transparent 1px); background-size: 56px 56px; }
  .frame { position: absolute; inset: 0; padding: 80px 88px; display: flex; flex-direction: column; }
  .wordmark { display: inline-flex; align-items: center; font-weight: 600; font-size: 26px; letter-spacing: 0.02em; }
  .wordmark img { height: 0.92em; margin: 0 1px; transform: translateY(0.115em); }
  h1 { font-size: 76px; font-weight: 500; letter-spacing: -0.035em; line-height: 1.02; margin: auto 0 0; max-width: 980px; text-wrap: balance; }
  h1 em { font-style: normal; color: var(--color-signal-lime); }
  .tag { font-family: var(--font-mono); font-size: 17px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-secondary); margin-top: 30px; }
  .tag em { font-style: normal; color: var(--color-signal-lime); }
  .foot { margin-top: auto; display: flex; font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); }
  .foot .r { margin-left: auto; }
  .qmark { position: absolute; right: -90px; top: -90px; width: 380px; height: 380px; opacity: 0.06; }
</style>
</head>
<body>
  <img class="qmark" src="../../assets/logo/qcore-mist.svg" alt="">
  <div class="grid-bg"></div>
  <div class="frame" data-screen-label="Deck / Cover">
    <span class="wordmark">INOVA<img src="../../assets/logo/qcore-lime.svg" alt="Q">O</span>
    <h1>AI product engineering for bold ideas that need to <em>scale</em>.</h1>
    <div class="tag">Move fast. Build clear. <em>Scale right.</em></div>
    <div class="foot"><span>Capabilities — 2026</span><span class="r">inovaqo.com</span></div>
  </div>
</body>
</html>
